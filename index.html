<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pet Care Services</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <h1>🐾 PetCare</h1>
    <nav>
      <a href="#services">Services</a>
      <a href="#pets">Pets</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <h2>Love & Care for Your Pets 🐶🐱</h2>
    <p>We provide grooming, checkups, and pet adoption services.</p>
    <button>Book Appointment</button>
  </section>

  <!-- SERVICES -->
  <section id="services">
    <h2>Our Services</h2>

    <div class="cards">
      <div class="card">
        🩺 Pet Checkup
      </div>

      <div class="card">
        ✂️ Grooming
      </div>

      <div class="card">
        🏠 Adoption
      </div>
    </div>
  </section>

  <!-- PET GALLERY -->
  <section id="pets">
    <h2>Our Cute Pets</h2>

    <div class="gallery">
      <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a" />
      <img src="https://images.unsplash.com/photo-1552053831-71594a27632d" />
      <img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b" />
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>Contact Us</h2>
    <p>Email: info@petcare.com</p>
  </section>

  <footer>
    <p>© 2026 PetCare Services</p>
  </footer>

</body>
</html>
